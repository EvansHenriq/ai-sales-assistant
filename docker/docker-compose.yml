services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: sales_assistant
      # Passed to the init script that creates the least-privilege app role.
      APP_DB_PASSWORD: ${APP_DB_PASSWORD:-change-me-app}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sales_assistant"]
      interval: 5s
      timeout: 3s
      retries: 10

  # One-shot migration runner. Uses the SUPERUSER connection because DDL is not
  # granted to the least-privilege app role.
  migrate:
    image: ai-sales-assistant:local
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: ["alembic", "upgrade", "head"]
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/sales_assistant
    depends_on:
      db:
        condition: service_healthy

  app:
    image: ai-sales-assistant:local
    build:
      context: ..
      dockerfile: docker/Dockerfile
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-local}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      # The application connects with the least-privilege app role (CRUD only).
      DATABASE_URL: postgresql+asyncpg://app:${APP_DB_PASSWORD:-change-me-app}@db:5432/sales_assistant
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1}
      OPENAI_MODEL_CHEAP: ${OPENAI_MODEL_CHEAP:-gpt-4.1-mini}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-http://localhost:3000}
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
    # Container hardening: no privilege escalation, drop all Linux capabilities.
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

volumes:
  pgdata:
