name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, type-check, security, tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: sales_assistant_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d sales_assistant_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      # Tests that need a DB use this. Unit tests ignore it.
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/sales_assistant_test
      ENVIRONMENT: test
      OPENAI_API_KEY: test-key-not-used

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Ruff (lint)
        run: uv run ruff check .

      - name: Ruff (format check)
        run: uv run ruff format --check .

      - name: Mypy (type-check)
        run: uv run mypy app

      - name: Bandit (SAST)
        run: uv run bandit -c pyproject.toml -r app

      - name: pip-audit (dependency vulnerabilities)
        run: uv run pip-audit

      - name: Pytest
        run: uv run pytest --cov --cov-report=term-missing

  gitleaks:
    name: Secret scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker-build:
    name: Docker image build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: false
          tags: ai-sales-assistant:ci
